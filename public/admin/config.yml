local_backend:
  url: http://192.168.1.230:8081/api/v1
  allowed_hosts:
    - 192.168.1.230
    - localhost

backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD MMMM YYYY"
        time_format: false
      - label: "Tag / Category"
        name: "tag"
        widget: "select"
        options:
          - "Grammar"
          - "Learning"
          - "Qur'an"
          - "Culture"
          - "Announcement"
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
      - label: "Body"
        name: "body"
        widget: "markdown"
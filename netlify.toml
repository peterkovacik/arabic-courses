[build]
  command = "npm run generate"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"

# Redirect /admin to Decap CMS
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Required for Netlify Identity (powers Decap CMS login)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Enable Netlify Identity widget on every page
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"
